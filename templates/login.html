{% extends 'base.html' %}
{% block title %}Login — ShopBlack{% endblock %}
{% block extra_css %}
<style>
.auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
.auth-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.auth-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.auth-sub { color: #888; font-size: 0.875rem; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 8px;
}
.form-group input {
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 3px;
  padding: 12px 14px;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}
.form-group input:focus { border-color: #000; }
.btn-auth {
  width: 100%;
  background: #000;
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: 3px;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}
.btn-auth:hover { background: #222; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #888; }
.auth-footer a { color: #000; font-weight: 600; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">WELCOME<br>BACK</h1>
    <p class="auth-sub">Sign in to your ShopBlack account</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-auth">Sign In →</button>
    </form>

    <div class="divider-text" style="margin:24px 0;">OR</div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
