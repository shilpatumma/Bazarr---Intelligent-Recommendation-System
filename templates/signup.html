{% extends 'base.html' %}
{% block title %}Sign Up — Bazarr{% endblock %}
{% block extra_css %}
<style>
.auth-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
.auth-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.auth-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.auth-sub { color: #888; font-size: 0.875rem; margin-bottom: 32px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #555; margin-bottom: 8px; }
.form-group input { width: 100%; border: 1px solid #ddd; border-radius: 3px; padding: 12px 14px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
.form-group input:focus { border-color: #000; }
.btn-auth { width: 100%; background: #000; color: #fff; border: none; padding: 13px; border-radius: 3px; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
.btn-auth:hover { background: #222; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #888; }
.auth-footer a { color: #000; font-weight: 600; text-decoration: none; }
.perks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
.perk { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: #666; }
.perk i { color: #000; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">CREATE<br>ACCOUNT</h1>
    <p class="auth-sub">Join millions of Bazarr shoppers</p>

    <div class="perks">
      <div class="perk"><i class="bi bi-check-circle"></i> Free delivery</div>
      <div class="perk"><i class="bi bi-check-circle"></i> Exclusive deals</div>
      <div class="perk"><i class="bi bi-check-circle"></i> Track orders</div>
      <div class="perk"><i class="bi bi-check-circle"></i> Easy returns</div>
    </div>

    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" name="phone" placeholder="+91 9876543210">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn-auth">Create Account →</button>
    </form>
    <div class="auth-footer" style="margin-top:20px;">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
